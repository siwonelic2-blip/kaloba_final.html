<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBA Kaloba Loan System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 10px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; border-radius: 10px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden; min-height: 90vh; }
        .header { background: #2c3e50; color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .main-content { padding: 20px; display: none; }
        .login-screen { padding: 50px 20px; text-align: center; display: block; }
        .menu { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .menu-btn { padding: 12px; background: #667eea; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .content-section { display: none; background: #f9f9f9; padding: 20px; border-radius: 8px; border: 1px solid #ddd; }
        .active { display: block; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; }
        .save-btn { background: #2e7d32; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>
<div class="container">
    <div id="loginScreen" class="login-screen">
        <h2>MBA Kaloba Loan Login</h2>
        <select id="userSelect">
            <option value="">-- Choose Owner --</option>
            <option value="Friday">Friday Chisupa (Lusaka)</option>
            <option value="Alex">Alex Mukosha (Kitwe)</option>
            <option value="Beatrice">Beatrice (Lusaka)</option>
        </select>
        <button class="save-btn" onclick="handleLogin()">Login to System</button>
    </div>

    <div id="mainApp" class="main-content">
        <div class="header">
            <div><h2 id="welcomeText">MBA Kaloba</h2><small id="locationText"></small></div>
            <button onclick="location.reload()" style="background:none; border:1px solid white; color:white; padding:5px; border-radius:3px;">Logout</button>
        </div>
        <div class="menu">
            <button class="menu-btn" onclick="showSection('regSection')">👤 Register</button>
            <button class="menu-btn" onclick="showSection('loanSection')">💵 Loan</button>
            <button class="menu-btn" onclick="showSection('repaySection')">💳 Repay</button>
            <button class="menu-btn" onclick="showSection('viewSection')">📊 Records</button>
        </div>

        <div id="regSection" class="content-section">
            <h3>Register Client</h3>
            <input type="text" id="regName" placeholder="Full Name">
            <input type="text" id="regPhone" placeholder="Phone">
            <button class="save-btn" onclick="saveClient()">Save to Cloud</button>
        </div>

        <div id="loanSection" class="content-section">
            <h3>Record Loan</h3>
            <select id="loanClientSelect"></select>
            <input type="number" id="loanAmount" placeholder="Amount (K)">
            <input type="number" id="loanInterest" placeholder="Interest %">
            <button class="save-btn" onclick="saveLoan()">Approve Loan</button>
        </div>

        <div id="repaySection" class="content-section">
            <h3>Record Repayment</h3>
            <select id="repayClientSelect"></select>
            <input type="number" id="repayAmount" placeholder="Amount Paid (K)">
            <button class="save-btn" onclick="saveRepayment()">Save Payment</button>
        </div>

        <div id="viewSection" class="content-section active">
            <button class="menu-btn" style="background:#1976d2" onclick="renderTable()">🔄 Refresh Data</button>
            <table>
                <thead><tr><th>Client</th><th>Borrowed</th><th>Total Due</th><th>Paid</th><th>Balance</th><th>Recorded By</th></tr></thead>
                <tbody id="loanTableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = "PASTE_YOUR_DEPLOYED_WEB_APP_URL_HERE";
    let activeUser = "";

    async function handleLogin() {
        activeUser = document.getElementById('userSelect').value;
        if(!activeUser) return alert("Select Name");
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        document.getElementById('welcomeText').innerText = "Owner: " + activeUser;
        document.getElementById('locationText').innerText = (activeUser === "Alex") ? "Kitwe" : "Lusaka";
        await updateDropdowns();
        await renderTable();
    }

    function showSection(id) {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    async function saveClient() {
        const name = document.getElementById('regName').value;
        if(!name) return;
        await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'addClient', name, phone: document.getElementById('regPhone').value })});
        alert("Saved!");
        updateDropdowns();
    }

    async function saveLoan() {
        const client = document.getElementById('loanClientSelect').value;
        const amt = parseFloat(document.getElementById('loanAmount').value);
        const intr = parseFloat(document.getElementById('loanInterest').value);
        const total = amt + (amt * (intr/100));
        await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'addLoan', client, amt, intr, total, owner: activeUser })});
        alert("Loan Recorded!");
        renderTable();
    }

    async function saveRepayment() {
        const client = document.getElementById('repayClientSelect').value;
        const pay = parseFloat(document.getElementById('repayAmount').value);
        await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'addRepayment', client, pay })});
        alert("Payment Recorded!");
        renderTable();
    }

    async function updateDropdowns() {
        const res = await fetch(SCRIPT_URL + "?action=getClients");
        const data = await res.json();
        let html = '<option value="">-- Select Client --</option>';
        data.forEach(c => html += `<option value="${c}">${c}</option>`);
        document.getElementById('loanClientSelect').innerHTML = html;
        document.getElementById('repayClientSelect').innerHTML = html;
    }

    async function renderTable() {
        document.getElementById('loanTableBody').innerHTML = "Loading...";
        const res = await fetch(SCRIPT_URL + "?action=getLoans");
        const data = await res.json();
        let html = "";
        data.forEach(l => {
            html += `<tr><td>${l.client}</td><td>K${l.amt}</td><td>K${l.total}</td><td>K${l.paid}</td><td><strong>K${l.total - l.paid}</strong></td><td>${l.owner}</td></tr>`;
        });
        document.getElementById('loanTableBody').innerHTML = html;
    }
</script>
</body>
</html>
