<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="MBA Kaloba Loan System — Professional loan management.">
    <title>MBA Kaloba Loan System</title>
    <!-- Tab Icon -->
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        /* Your Existing Styles */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 10px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; border-radius: 10px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3); overflow: hidden; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .main-content { padding: 20px; }
        .menu { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .menu-btn { padding: 15px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        /* Professional Export Button Style */
        .export-btn { background-color: #2e7d32; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>MBA Kaloba Loan</h1>
            <div id="status">Status: Online</div>
        </div>

        <div class="main-content">
            <div class="menu">
                <button class="menu-btn" onclick="showSection('loans')">Loan Records</button>
                <button class="menu-btn" onclick="showSection('calculator')">Calculator</button>
            </div>

            <!-- EXCEL EXPORT SECTION -->
            <div id="loansSection">
                <button class="export-btn" onclick="exportToExcel()">📊 Download Excel Report</button>
                <table id="loanTable">
                    <thead>
                        <tr>
                            <th>Client Name</th>
                            <th>Amount</th>
                            <th>Interest</th>
                            <th>Total Due</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Data will appear here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // FUNCTION: EXPORT TO EXCEL
        function exportToExcel() {
            let table = document.getElementById("loanTable");
            let html = table.outerHTML;
            let url = 'data:application/vnd.ms-excel,' + encodeURIComponent(html);
            let link = document.createElement("a");
            link.download = "MBA_Kaloba_Report.xls";
            link.href = url;
            link.click();
        }

        function showSection(id) {
            console.log("Showing section: " + id);
        }

        // OFFLINE MODE (PWA) SETUP
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('https://github.io')
                .then(reg => console.log('Offline mode active!'))
                .catch(err => console.error('Offline setup failed', err));
            });
        }
    </script>
</body>
</html>
